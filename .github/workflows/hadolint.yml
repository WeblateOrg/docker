name: Hadolint

on:
  push:
    branches-ignore:
    - deepsource-fix-**
    - renovate/**
    - weblate
    - dependabot/**
  pull_request:

permissions:
  contents: read

jobs:
  hadolint:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
